<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>4399 Flash 播放器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #stage { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #FFC107; font-family: -apple-system, "Microsoft YaHei", sans-serif;
    z-index: 10; background: #000;
  }
  .spinner {
    width: 48px; height: 48px; border: 4px solid rgba(255,193,7,.25);
    border-top-color: #FFC107; border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .text { margin-top: 16px; font-size: 15px; letter-spacing: 1px; }
  #hint {
    position: fixed; bottom: 16px; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,.5); font-size: 12px; z-index: 10;
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="loading">
    <div class="spinner"></div>
    <div class="text" id="loadText">正在加载 Flash 引擎…</div>
  </div>
  <div id="hint">提示：可在右上角开启虚拟手柄，或连接实体键盘游玩</div>

  <script>
    // 解析查询参数
    function param(name, def) {
      return new URLSearchParams(location.search).get(name) || def || '';
    }
    var SWF_URL    = param('swf');
    var BASE_URL   = param('base');
    var TITLE      = param('title') || 'Flash 游戏';
    var ENGINE     = param('engine', 'ruffle');  // ruffle / swf2js
    var CDN_URL    = param('cdn', '');
    var CDN_PATH   = param('path', '');
    var AUTOPLAY   = param('autoplay', 'on');

    document.title = TITLE;
    var loadText = document.getElementById('loadText');
    var stage = document.getElementById('stage');

    // 根据引擎选择加载方式
    if (ENGINE === 'swf2js') {
      // ===== swf2js 引擎 =====
      loadText.textContent = '正在加载 swf2js 引擎…';
      var swf2jsUrl = CDN_URL || 'file:///android_asset/swf2js/swf2js.js';
      var s2 = document.createElement('script');
      s2.src = swf2jsUrl;
      s2.async = true;
      s2.onload = function () {
        loadText.textContent = '正在加载游戏: ' + TITLE;
        try {
          var container = document.createElement('div');
          container.style.cssText = 'width:100%;height:100%;position:relative;';
          stage.appendChild(container);
          swf2js.load(SWF_URL, { tag: container });
          document.getElementById('loading').style.display = 'none';
          if (window.Android && window.Android.log) {
            window.Android.log('swf2js', '播放: ' + SWF_URL);
          }
        } catch (e) {
          loadText.textContent = '加载失败: ' + e.message;
          console.error(e);
        }
      };
      s2.onerror = function () {
        loadText.textContent = 'swf2js 引擎加载失败';
      };
      document.head.appendChild(s2);

    } else {
      // ===== Ruffle 引擎 =====
      loadText.textContent = '正在加载 Ruffle 引擎…';

      // 如果没有指定 CDN，默认用本地
      var ruffleUrl = CDN_URL || 'file:///android_asset/ruffle/ruffle.js';
      var rufflePath = CDN_PATH || 'file:///android_asset/ruffle/';

      // 1) 预置 Ruffle 配置（必须早于 ruffle.js）
      window.RufflePlayer = window.RufflePlayer || {};
      window.RufflePlayer.config = {
        "publicPath": rufflePath,
        "polyfills": true,
        "autoplay": AUTOPLAY,
        "unmuteOverlay": "visible",
        "letterbox": "fullscreen",
        "upgradeToHttps": true,
        "allowScriptAccess": true,
        "scale": "showAll",
        "quality": "high",
        "allowFullscreen": true,
        "splashScreen": true,
        "preloader": true,
        "logLevel": "warn",
        "maxExecutionDuration": { "secs": 30, "nanos": 0 }
      };

      // 2) 动态加载 Ruffle
      var s = document.createElement('script');
      s.src = ruffleUrl;
      s.async = true;
      s.onload = function () {
        loadText.textContent = '正在加载游戏: ' + TITLE;
        try {
          var ruffle = window.RufflePlayer.newest();
          var player = ruffle.createPlayer();
          stage.appendChild(player);
          player.style.width = '100%';
          player.style.height = '100%';
          player.style.display = 'block';
          var opt = { url: SWF_URL, allowScriptAccess: true };
          if (BASE_URL) opt.base = BASE_URL;
          player.ruffle().load(opt);
          document.getElementById('loading').style.display = 'none';
          if (window.Android && window.Android.log) {
            window.Android.log('Ruffle', '播放: ' + SWF_URL);
          }
        } catch (e) {
          loadText.textContent = '加载失败: ' + e.message;
          console.error(e);
        }
      };
      s.onerror = function () {
        loadText.textContent = 'Ruffle 引擎加载失败，请检查网络';
      };
      document.head.appendChild(s);
    }

    // 暴露给 Android 调用的播放接口
    window.__playSwf = function(url, base) {
      if (ENGINE === 'swf2js') {
        try {
          var c = document.createElement('div');
          c.style.cssText = 'width:100%;height:100%;position:relative;';
          stage.innerHTML = '';
          stage.appendChild(c);
          swf2js.load(url, { tag: c });
        } catch(e) { console.error(e); }
      } else {
        try {
          var ruffle = window.RufflePlayer.newest();
          var player = ruffle.createPlayer();
          stage.innerHTML = '';
          stage.appendChild(player);
          player.style.width = '100%';
          player.style.height = '100%';
          var opt = { url: url, allowScriptAccess: true };
          if (base) opt.base = base;
          player.ruffle().load(opt);
        } catch(e) { console.error(e); }
      }
    };

    // 禁用长按选择 / 上下文菜单 / 缩放
    document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    document.addEventListener('selectstart', function (e) { e.preventDefault(); });
    document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
  </script>
</body>
</html>
