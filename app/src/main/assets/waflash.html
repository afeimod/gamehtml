<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>WAFlash 播放器</title>
<link rel="stylesheet" href="https://flash.local/waflash/waflash-style.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #waflashContainer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #canvas { max-width: 100%; max-height: 100%; outline: none; }
  #waflashStatus {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #beb5f9; font-family: -apple-system, "Microsoft YaHei", sans-serif;
    font-size: 16px; text-align: center; z-index: 10;
  }
  #debugLog {
    position: fixed; bottom: 20px; left: 8px; right: 8px;
    color: #0f0; font-family: monospace; font-size: 11px; z-index: 20;
    max-height: 120px; overflow-y: auto; background: rgba(0,0,0,.7);
    padding: 4px; border-radius: 4px; display: none;
  }
  #hint {
    position: fixed; bottom: 4px; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,.3); font-size: 10px; z-index: 10;
  }
</style>
</head>
<body>
  <div id="waflashContainer">
    <canvas class="waflashCanvas" id="canvas" tabindex="1"></canvas>
    <div id="waflashStatus">Loading...</div>
  </div>
  <div id="debugLog"></div>
  <div id="hint">WAFlash · AS2/AS3</div>

  <script>
    var dbgEl = document.getElementById('debugLog');
    var dbgVisible = false;
    function dbg(msg) {
      console.log('[WAF]', msg);
      if (!dbgVisible) { dbgEl.style.display = 'block'; dbgVisible = true; }
      dbgEl.innerHTML = msg + '<br>' + dbgEl.innerHTML;
    }
    window.addEventListener('error', function(e) { dbg('ERROR: ' + (e.message || e)); });

    function param(name, def) {
      return new URLSearchParams(location.search).get(name) || def || '';
    }
    var SWF_URL = param('swf');
    var TITLE = param('title') || 'Flash 游戏';
    document.title = TITLE;

    var canvas = document.getElementById('canvas');
    canvas.addEventListener('click', function() { canvas.focus(); });

    dbg('SWF_URL=' + SWF_URL);
    dbg('Page URL=' + location.href);
  </script>

  <!-- 从 flash.local 虚拟域名加载，shouldInterceptRequest 拦截并从 assets 返回
       Emscripten 的 fetch/XHR 需要 CORS 头，flash.local 能提供 -->
  <script type="module">
    const SWF_URL = new URLSearchParams(location.search).get('swf') || '';
    const statusEl = document.getElementById('waflashStatus');

    if (!SWF_URL) { statusEl.textContent = '错误: 未指定 SWF URL'; }

    dbg('加载 waflash-player.min.js...');

    import('https://flash.local/waflash/waflash-player.min.js').then(function(module) {
      dbg('waflash-player 加载成功, exports: ' + Object.keys(module).join(','));
      const createWaflash = module.createWaflash;
      if (!createWaflash) { statusEl.textContent = 'createWaflash 未找到'; return; }

      statusEl.style.display = 'block';
      statusEl.textContent = '正在加载引擎...';
      dbg('调用 createWaflash("' + SWF_URL + '")');

      try {
        createWaflash(SWF_URL, { gpu: true });
        dbg('createWaflash 已调用');
      } catch(e) {
        dbg('createWaflash 异常: ' + e.message);
        statusEl.textContent = '加载失败: ' + e.message;
      }
    }).catch(function(err) {
      dbg('waflash-player 加载失败: ' + (err.message || err));
      statusEl.textContent = '引擎加载失败';
      statusEl.style.display = 'block';
    });

    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('selectstart', function(e) { e.preventDefault(); });
  </script>
</body>
</html>
