<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>WAFlash 播放器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #000; overflow: hidden;
    font-family: "Microsoft YaHei", "微软雅黑", "Noto Sans CJK SC", "Source Han Sans SC",
                 "PingFang SC", "Heiti SC", "SimHei", "WenQuanYi Micro Hei",
                 Arial, Helvetica, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  canvas {
    width: 100%; height: 100%; display: block; outline: none;
    font-family: "Microsoft YaHei", "微软雅黑", "Noto Sans CJK SC", "Source Han Sans SC",
                 "PingFang SC", "Heiti SC", "SimHei", "WenQuanYi Micro Hei",
                 Arial, Helvetica, sans-serif !important;
  }
  #waflashStatus {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #beb5f9; font-family: -apple-system, "Microsoft YaHei", sans-serif;
    font-size: 16px; text-align: center; z-index: 10;
  }
  #hint {
    position: fixed; bottom: 4px; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,.3); font-size: 10px; z-index: 10;
  }
</style>
</head>
<body>
  <canvas class="waflashCanvas" id="canvas" tabindex="1"></canvas>
  <div id="waflashStatus">Loading...</div>
  <div id="hint">WAFlash · AS2/AS3</div>

  <script>
    var params = new URLSearchParams(location.search);
    var SWF_URL = params.get('swf') || '';
    var BASE_URL = params.get('base') || '';
    var TITLE = params.get('title') || 'Flash 游戏';
    document.title = TITLE;

    var statusEl = document.getElementById('waflashStatus');
    var canvas = document.getElementById('canvas');
    canvas.addEventListener('click', function() { canvas.focus(); });

    // 判断是否为本地文件代理 URL（flash.local/local.swf），处理可能的时间戳参数
    var isLocalFile = SWF_URL.split('?')[0] === 'https://flash.local/local.swf';

    if (!SWF_URL) {
      statusEl.textContent = '错误: 未指定 SWF URL';
    } else {
      statusEl.textContent = '正在加载引擎...';
    }

    // 设置 <base> 标签：SWF 内部相对路径以原始页面 URL 为 base
    if (BASE_URL) {
      try {
        var baseObj = new URL(BASE_URL);
        var baseTag = document.createElement('base');
        baseTag.href = baseObj.origin + baseObj.pathname.substring(0, baseObj.pathname.lastIndexOf('/') + 1);
        document.head.appendChild(baseTag);
        console.log('[WAF] base href: ' + baseTag.href);
      } catch(e) {}
    }

    console.log('[WAF] SWF_URL: ' + SWF_URL);
    console.log('[WAF] isLocalFile: ' + isLocalFile);

    // 加载 WAFlash 引擎
    function loadEngine(swfUrlToLoad) {
      import('https://flash.local/waflash/waflash-player.min.js').then(function(module) {
        console.log('[WAF] 引擎加载完成');
        statusEl.textContent = '正在加载 SWF...';

        var fn = (module && module.createWaflash) || window.createWaflash;
        if (!fn) {
          console.log('[WAF] createWaflash 未导出，可能已自动启动');
          setTimeout(function() { statusEl.style.display = 'none'; }, 3000);
          return;
        }

        try {
          fn(swfUrlToLoad, { gpu: true });
          console.log('[WAF] createWaflash 已调用: ' + swfUrlToLoad);
          setTimeout(function() { statusEl.style.display = 'none'; }, 3000);
        } catch(e) {
          statusEl.textContent = '加载失败: ' + e.message;
          console.error('[WAF] ' + e.message);
        }
      }).catch(function(err) {
        statusEl.textContent = '引擎加载失败';
        console.error('[WAF] 引擎: ' + (err.message || err));
      });
    }

    if (isLocalFile) {
      // 本地文件：SWF_URL 已被替换为 https://flash.local/local.swf
      // shouldInterceptRequest 会拦截此 URL 并读取真实文件
      // 直接传给 WAFlash 即可（WAFlash 的 fetch 能拦截 flash.local 的 HTTP 请求）
      console.log('[WAF] 本地文件模式：虚拟 URL 代理');
      loadEngine(SWF_URL);
    } else {
      // 远程 SWF：直接传 URL 给 WAFlash
      loadEngine(SWF_URL);
    }

    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('selectstart', function(e) { e.preventDefault(); });
  </script>
</body>
</html>
