<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>WAFlash 播放器</title>
<link rel="stylesheet" href="https://flash.local/waflash/waflash-style.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #waflashContainer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #canvas { max-width: 100%; max-height: 100%; outline: none; }
  #waflashStatus {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #beb5f9; font-family: -apple-system, "Microsoft YaHei", sans-serif;
    font-size: 16px; text-align: center; z-index: 10;
  }
  #hint {
    position: fixed; bottom: 8px; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,.4); font-size: 11px; z-index: 10;
  }
</style>
</head>
<body>
  <div id="waflashContainer">
    <canvas class="waflashCanvas" id="canvas" tabindex="1"></canvas>
    <div id="waflashStatus" style="display: none;">Loading...</div>
  </div>
  <div id="hint">WAFlash 引擎 · AS2/AS3 完整支持</div>

  <script>
    function param(name, def) {
      return new URLSearchParams(location.search).get(name) || def || '';
    }
    var SWF_URL = param('swf');
    var TITLE = param('title') || 'Flash 游戏';
    document.title = TITLE;

    // canvas 点击聚焦（键盘输入需要）
    var canvas = document.getElementById('canvas');
    canvas.addEventListener('click', function() { canvas.focus(); });
    canvas.addEventListener('keydown', function(ev) { ev.preventDefault(); ev.stopPropagation(); });
  </script>

  <!-- WAFlash 入口：waflash-player.min.js 导出 createWaflash(swfUrl, options)
       它内部 import waflash.min.js (Emscripten 模块) 并加载 waflash.wasm + waflash.data
       使用 flash.local 虚拟域名，shouldInterceptRequest 从 assets 返回文件 -->
  <script type="module">
    const SWF_URL = new URLSearchParams(location.search).get('swf') || '';
    const WAFLASH_BASE = 'https://flash.local/waflash/';

    // 动态 import waflash-player.min.js
    import(WAFLASH_BASE + 'waflash-player.min.js').then(function(module) {
      const createWaflash = module.createWaflash;
      const statusEl = document.getElementById('waflashStatus');

      statusEl.style.display = 'block';
      statusEl.textContent = '正在加载 WAFlash 引擎...';

      // createWaflash(swfUrl, options)
      // swfUrl 为空时 createWaflash 会直接 return，所以必须确保有值
      if (!SWF_URL) {
        statusEl.textContent = '错误: 未指定 SWF URL';
        return;
      }

      // 调用 createWaflash，传入 SWF URL 和选项
      createWaflash(SWF_URL, {
        gpu: true,           // 使用 WebGL 渲染
        enableFilters: false  // 禁用滤镜（提升性能）
      });

      console.log('[WAFlash] createWaflash called with: ' + SWF_URL);
    }).catch(function(err) {
      console.error('[WAFlash] module load failed:', err);
      const statusEl = document.getElementById('waflashStatus');
      statusEl.textContent = 'WAFlash 引擎加载失败: ' + (err.message || err);
      statusEl.style.display = 'block';
    });

    // 禁用长按选择 / 上下文菜单
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('selectstart', function(e) { e.preventDefault(); });
  </script>
</body>
</html>
