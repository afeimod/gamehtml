<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>WAFlash 播放器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #000; overflow: hidden;
    font-family: "Microsoft YaHei", "微软雅黑", "Noto Sans CJK SC", "Source Han Sans SC",
                 "PingFang SC", "Heiti SC", "SimHei", "WenQuanYi Micro Hei",
                 Arial, Helvetica, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  canvas {
    width: 100%; height: 100%; display: block; outline: none;
    font-family: "Microsoft YaHei", "微软雅黑", "Noto Sans CJK SC", "Source Han Sans SC",
                 "PingFang SC", "Heiti SC", "SimHei", "WenQuanYi Micro Hei",
                 Arial, Helvetica, sans-serif !important;
  }
  #waflashStatus {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #beb5f9; font-family: -apple-system, "Microsoft YaHei", sans-serif;
    font-size: 16px; text-align: center; z-index: 10;
  }
  #hint {
    position: fixed; bottom: 4px; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,.3); font-size: 10px; z-index: 10;
  }
</style>
<script>
  // === 字体别名注入：通过 @font-face 将中文字体名映射到 Android 系统的 CJK 字体 ===
  // WAFlash 渲染时会通过浏览器 FontFace API 查找字体
  (function(){
    var fontAliases = {
      'SimHei': ['Noto Sans CJK SC','Noto Sans SC','Source Han Sans SC','WenQuanYi Micro Hei','Droid Sans Fallback','sans-serif'],
      '黑体': ['Noto Sans CJK SC','Noto Sans SC','Source Han Sans SC','WenQuanYi Micro Hei','Droid Sans Fallback','sans-serif'],
      'Microsoft YaHei': ['Noto Sans CJK SC','Noto Sans SC','Source Han Sans SC','PingFang SC','WenQuanYi Micro Hei','Droid Sans Fallback','sans-serif'],
      '微软雅黑': ['Noto Sans CJK SC','Noto Sans SC','Source Han Sans SC','WenQuanYi Micro Hei','Droid Sans Fallback','sans-serif'],
      'SimSun': ['Noto Serif CJK SC','Noto Serif SC','Source Han Serif SC','Song','STSong','Noto Sans CJK SC','Droid Sans Fallback','serif'],
      '宋体': ['Noto Serif CJK SC','Noto Serif SC','Source Han Serif SC','Song','STSong','Noto Sans CJK SC','Droid Sans Fallback','serif'],
      'KaiTi': ['Noto Sans CJK SC','KaiTi SC','STKaiti','Droid Sans Fallback','sans-serif'],
      '楷体': ['Noto Sans CJK SC','KaiTi SC','STKaiti','Droid Sans Fallback','sans-serif'],
      'FangSong': ['Noto Serif CJK SC','STFangsong','Noto Sans CJK SC','Droid Sans Fallback','serif'],
      '仿宋': ['Noto Serif CJK SC','STFangsong','Noto Sans CJK SC','Droid Sans Fallback','serif'],
      'Arial': ['Arial','Noto Sans CJK SC','Noto Sans SC','Droid Sans Fallback','sans-serif'],
      'Tahoma': ['Tahoma','Noto Sans CJK SC','Noto Sans SC','Droid Sans Fallback','sans-serif'],
      'Helvetica': ['Helvetica','Noto Sans CJK SC','Noto Sans SC','Droid Sans Fallback','sans-serif']
    };
    var css = '';
    for (var name in fontAliases) {
      var src = fontAliases[name].map(function(f){ return "local('"+f+"')"; }).join(',');
      css += "@font-face{font-family:'"+name+"';src:"+src+";font-weight:normal;font-style:normal;}";
      var boldSrc = fontAliases[name].map(function(f){ return "local('"+f+" Bold')"; }).concat(fontAliases[name].map(function(f){ return "local('"+f+"')"; })).join(',');
      css += "@font-face{font-family:'"+name+"';src:"+boldSrc+";font-weight:bold;font-style:normal;}";
    }
    var style = document.createElement('style');
    style.textContent = css;
    document.head.appendChild(style);
    console.log('[Font] 已注入 ' + Object.keys(fontAliases).length + ' 个字体别名');
  })();
</script>
</head>
<body>
  <canvas class="waflashCanvas" id="canvas" tabindex="1"></canvas>
  <div id="waflashStatus">Loading...</div>
  <div id="hint">WAFlash · AS2/AS3</div>

  <script>
    var params = new URLSearchParams(location.search);
    var SWF_URL = params.get('swf') || '';
    var BASE_URL = params.get('base') || '';
    var TITLE = params.get('title') || 'Flash 游戏';
    document.title = TITLE;

    var statusEl = document.getElementById('waflashStatus');
    var canvas = document.getElementById('canvas');
    canvas.addEventListener('click', function() { canvas.focus(); });

    // 判断是否为本地文件代理 URL（flash.local/local.swf），处理可能的时间戳参数
    var isLocalFile = SWF_URL.split('?')[0] === 'https://flash.local/local.swf';

    if (!SWF_URL) {
      statusEl.textContent = '错误: 未指定 SWF URL';
    } else {
      statusEl.textContent = '正在加载引擎...';
    }

    // 设置 <base> 标签：SWF 内部相对路径以原始页面 URL 为 base
    if (BASE_URL) {
      try {
        var baseObj = new URL(BASE_URL);
        var baseTag = document.createElement('base');
        baseTag.href = baseObj.origin + baseObj.pathname.substring(0, baseObj.pathname.lastIndexOf('/') + 1);
        document.head.appendChild(baseTag);
        console.log('[WAF] base href: ' + baseTag.href);
      } catch(e) {}
    }

    console.log('[WAF] SWF_URL: ' + SWF_URL);
    console.log('[WAF] isLocalFile: ' + isLocalFile);

    // === WebGL 可用性检测 ===
    // 某些 Android 设备 WebGL 支持不完整，需要检测后决定是否使用 GPU 渲染
    function checkWebGLSupport() {
      try {
        var testCanvas = document.createElement('canvas');
        var gl = testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl');
        if (!gl) return false;
        // 检查 WebGL 是否真正可用（有些设备返回 context 但实际无法渲染）
        var debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        var renderer = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : '';
        // 如果渲染器为空或包含 "SwiftShader"（软件渲染），仍然可以使用但性能差
        // 这里我们允许使用，只在完全无 WebGL 时回退
        return true;
      } catch(e) {
        console.warn('[WAF] WebGL 检测失败: ' + e.message);
        return false;
      }
    }

    var useGpu = checkWebGLSupport();
    console.log('[WAF] WebGL 支持检测: ' + (useGpu ? 'webgl' : 'default(Canvas2D)'));

    // 设置 canvas 物理尺寸（WAFlash 需要 canvas 有明确的尺寸才能正确渲染）
    function resizeCanvas() {
      var w = window.innerWidth || document.documentElement.clientWidth || 800;
      var h = window.innerHeight || document.documentElement.clientHeight || 600;
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = '100%';
      canvas.style.height = '100%';
    }
    resizeCanvas();
    window.addEventListener('resize', function() {
      // WAFlash 内部会处理 resize，这里只确保 canvas 尺寸非零
      if (canvas.width === 0 || canvas.height === 0) resizeCanvas();
    });

    // 加载 WAFlash 引擎
    function loadEngine(swfUrlToLoad) {
      import('https://flash.local/waflash/waflash-player.min.js').then(function(module) {
        console.log('[WAF] 引擎加载完成');
        statusEl.textContent = '正在加载 SWF...';

        var fn = (module && module.createWaflash) || window.createWaflash;
        if (!fn) {
          console.log('[WAF] createWaflash 未导出，可能已自动启动');
          setTimeout(function() { statusEl.style.display = 'none'; }, 3000);
          return;
        }

        try {
          // WAFlash createWaflash 参数: (swfUrl, options)
          // options.gpu: true=WebGL渲染, false=Canvas2D渲染
          // options.enableFilters: true=启用滤镜, false=禁用滤镜(性能更好)
          fn(swfUrlToLoad, {
            gpu: useGpu,
            enableFilters: true
          });
          console.log('[WAF] createWaflash 已调用: ' + swfUrlToLoad + ' (gpu=' + useGpu + ')');
          setTimeout(function() { statusEl.style.display = 'none'; }, 3000);
        } catch(e) {
          console.error('[WAF] 播放失败(WebGL): ' + e.message + '，尝试回退到 Canvas2D');
          // WebGL 失败时回退到 Canvas2D
          try {
            useGpu = false;
            fn(swfUrlToLoad, {
              gpu: false,
              enableFilters: true
            });
            console.log('[WAF] Canvas2D 回退成功');
            setTimeout(function() { statusEl.style.display = 'none'; }, 3000);
          } catch(e2) {
            statusEl.textContent = '加载失败: ' + e2.message;
            console.error('[WAF] Canvas2D 也失败: ' + e2.message);
          }
        }
      }).catch(function(err) {
        statusEl.textContent = '引擎加载失败';
        console.error('[WAF] 引擎: ' + (err.message || err));
      });
    }

    if (isLocalFile) {
      // 本地文件：SWF_URL 已被替换为 https://flash.local/local.swf
      // shouldInterceptRequest 会拦截此 URL 并读取真实文件
      console.log('[WAF] 本地文件模式：虚拟 URL 代理');
      loadEngine(SWF_URL);
    } else {
      // 远程 SWF：直接传 URL 给 WAFlash
      loadEngine(SWF_URL);
    }

    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('selectstart', function(e) { e.preventDefault(); });
  </script>
</body>
</html>
