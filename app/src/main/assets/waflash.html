<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>WAFlash 播放器</title>
<link rel="stylesheet" href="https://flash.local/waflash/waflash-style.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #waflashContainer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  #canvas { max-width: 100%; max-height: 100%; outline: none; }
  #waflashStatus {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #beb5f9; font-family: -apple-system, "Microsoft YaHei", sans-serif;
    font-size: 16px; text-align: center; z-index: 10;
  }
  #hint {
    position: fixed; bottom: 4px; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,.3); font-size: 10px; z-index: 10;
  }
</style>
</head>
<body>
  <div id="waflashContainer">
    <canvas class="waflashCanvas" id="canvas" tabindex="1"></canvas>
    <div id="waflashStatus">Loading...</div>
  </div>
  <div id="hint">WAFlash · AS2/AS3</div>

  <script>
    function param(name, def) {
      return new URLSearchParams(location.search).get(name) || def || '';
    }
    var SWF_URL = param('swf');
    var TITLE = param('title') || 'Flash 游戏';
    document.title = TITLE;

    var canvas = document.getElementById('canvas');
    canvas.addEventListener('click', function() { canvas.focus(); });

    // 重写 fetch：WAFlash 内部的 fetch() 不被 shouldInterceptRequest 拦截，
    // 用 XMLHttpRequest 替代（XHR 一定被拦截），SWF 请求会被 interceptSwf 原生代理
    var _origFetch = window.fetch;
    window.fetch = function(input, init) {
      var url = (typeof input === 'string') ? input : (input && input.url) || '';
      // 只拦截 SWF 相关请求，其他请求走原始 fetch
      if (url && (/\.swf/i.test(url) || /\/dw-\d+/i.test(url) || /4399\.com/i.test(url))) {
        return new Promise(function(resolve, reject) {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', url, true);
          xhr.responseType = 'arraybuffer';
          if (init && init.headers) {
            try {
              Object.keys(init.headers).forEach(function(k) {
                xhr.setRequestHeader(k, init.headers[k]);
              });
            } catch(e) {}
          }
          xhr.onload = function() {
            var headers = new Headers();
            try {
              var allHeaders = xhr.getAllResponseHeaders().split('\r\n');
              allHeaders.forEach(function(h) {
                var idx = h.indexOf(': ');
                if (idx > 0) headers.set(h.substring(0, idx), h.substring(idx + 2));
              });
            } catch(e) {}
            resolve(new Response(xhr.response, {
              status: xhr.status,
              statusText: xhr.statusText,
              headers: headers
            }));
          };
          xhr.onerror = function() { reject(new TypeError('Network request failed (XHR fallback)')); };
          xhr.ontimeout = function() { reject(new TypeError('Network request timed out')); };
          xhr.timeout = 30000;
          xhr.send();
        });
      }
      return _origFetch.apply(this, arguments);
    };
    console.log('[WAF] fetch 已重写（XHR fallback for SWF）');
  </script>

  <script type="module">
    const SWF_URL = new URLSearchParams(location.search).get('swf') || '';
    const statusEl = document.getElementById('waflashStatus');

    if (!SWF_URL) { statusEl.textContent = '错误: 未指定 SWF URL'; }

    import('https://flash.local/waflash/waflash-player.min.js').then(function(module) {
      const createWaflash = module.createWaflash;
      if (!createWaflash) { statusEl.textContent = '引擎加载失败'; return; }

      statusEl.style.display = 'block';
      statusEl.textContent = '正在加载引擎...';

      try {
        createWaflash(SWF_URL, { gpu: true });
      } catch(e) {
        statusEl.textContent = '加载失败: ' + e.message;
      }
    }).catch(function(err) {
      statusEl.textContent = '引擎加载失败';
      statusEl.style.display = 'block';
    });

    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('selectstart', function(e) { e.preventDefault(); });
  </script>
</body>
</html>
