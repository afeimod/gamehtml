# 4399 游戏盒 - APK 构建 Workflow
#
# 触发方式：手动触发（GitHub 仓库 → Actions → Build APK → Run workflow）
#
# 本 workflow 只在手动触发时运行，不会消耗额外的 Actions 额度。
# 公开仓库 Actions 完全免费；私有仓库每月 2000 分钟免费额度。

name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 构建类型
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release
          - both

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # 使用干净的 GRADLE_USER_HOME，绕过 ubuntu-latest 预装的 AGP 8.1.0
      # 预装的 init 脚本位于 ~/.gradle/init.d/，会把 AGP 8.1.0 注入 classpath
      # 指向新路径后 Gradle 不会加载那些 init 脚本，项目声明的 8.5.0 可正常解析
      GRADLE_USER_HOME: /tmp/gradle-home-clean

    steps:
      # ---------- 1. 检出代码 ----------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- 2. 配置 JDK 17 ----------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ---------- 3. 验证 Android SDK（ubuntu-latest 已预装） ----------
      # ubuntu-latest 镜像已预装 Android SDK 35 和 build-tools 35.0.0
      # 无需再用 android-actions/setup-android（该 action 在 v3 版本对多包名解析有 bug）
      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo ""
          echo "=== 已安装的 platforms ==="
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "platforms 目录不存在"
          echo ""
          echo "=== 已安装的 build-tools ==="
          ls -la "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "build-tools 目录不存在"
          echo ""
          # 如果缺少 android-35，则用 sdkmanager 单独安装（单包名调用，避免多包名解析 bug）
          if [ ! -d "$ANDROID_HOME/platforms/android-35" ]; then
            echo "android-35 缺失，正在安装..."
            yes | sdkmanager "platforms;android-35" > /dev/null 2>&1 || true
          fi
          if [ ! -d "$ANDROID_HOME/build-tools/35.0.0" ]; then
            echo "build-tools;35.0.0 缺失，正在安装..."
            yes | sdkmanager "build-tools;35.0.0" > /dev/null 2>&1 || true
          fi
          echo ""
          echo "=== 最终验证 ==="
          ls "$ANDROID_HOME/platforms/" 2>/dev/null
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null

      # ---------- 4. 清理预装的 AGP 冲突 + 生成 Gradle Wrapper ----------
      # ubuntu-latest 镜像在 ~/.gradle/ 预装了 AGP 8.1.0，会与项目声明的 8.5.0 冲突
      # 解决方案：使用干净的 GRADLE_USER_HOME，并清理 init 脚本
      - name: Clean Gradle env and Generate Wrapper
        run: |
          # 诊断：查看预装镜像的 init 脚本（它会注入 AGP 8.1.0 到 classpath）
          echo "=== ~/.gradle/init.d/ 内容（预装的 AGP 注入脚本）==="
          ls -la ~/.gradle/init.d/ 2>/dev/null || echo "（不存在）"
          for f in ~/.gradle/init.d/*.gradle; do
            [ -f "$f" ] && echo "--- $f ---" && head -20 "$f"
          done 2>/dev/null || true

          # 创建干净的 GRADLE_USER_HOME（job 级 env 已指向 /tmp/gradle-home-clean）
          mkdir -p /tmp/gradle-home-clean
          # 额外清理：删除预装镜像里的 init 脚本（双保险）
          rm -rf ~/.gradle/init.d/ 2>/dev/null || true

          echo ""
          echo "=== 当前 GRADLE_USER_HOME=$GRADLE_USER_HOME ==="
          echo "（指向新路径，Gradle 不会加载 ~/.gradle/init.d/ 里的脚本）"

          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ ! -f gradlew ]; then
            echo "Gradle wrapper 缺失，正在生成..."
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          else
            echo "Gradle wrapper 已存在"
          fi
          chmod +x gradlew
          ./gradlew --version

      # ---------- 5. 准备 Release 签名 ----------
      - name: Prepare signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          if [ -z "$SIGNING_KEY_BASE64" ]; then
            echo "未配置签名 Secrets，使用 debug 签名"
            mkdir -p app
            cat > app/keystore.properties <<'EOF'
          storeFile=$ANDROID_SDK_ROOT/.android/debug.keystore
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF
          else
            echo "检测到签名 Secrets，解码 keystore..."
            echo "$SIGNING_KEY_BASE64" | base64 -d > app/release.keystore
            cat > app/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$SIGNING_STORE_PASSWORD
          keyAlias=$SIGNING_KEY_ALIAS
          keyPassword=$SIGNING_KEY_PASSWORD
          EOF
          fi
          echo "✓ keystore.properties 已生成"

      # ---------- 6. 构建 Debug APK ----------
      - name: Build Debug APK
        if: ${{ inputs.build_type == 'debug' || inputs.build_type == 'both' }}
        run: ./gradlew assembleDebug --stacktrace

      # ---------- 7. 构建 Release APK ----------
      - name: Build Release APK
        if: ${{ inputs.build_type == 'release' || inputs.build_type == 'both' }}
        run: ./gradlew assembleRelease --stacktrace

      # ---------- 8. 收集 APK ----------
      - name: Collect APKs
        run: |
          echo "=== 构建产物 ==="
          find app/build/outputs/apk -name "*.apk" 2>/dev/null || echo "未找到 APK"

          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts | head -1)
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')
          SUFFIX="${VERSION}-${SHORT_SHA}-${DATE}"

          mkdir -p artifacts
          [ -f app/build/outputs/apk/debug/app-debug.apk ] && \
            cp app/build/outputs/apk/debug/app-debug.apk artifacts/Game4399-${SUFFIX}-debug.apk
          [ -f app/build/outputs/apk/release/app-release.apk ] && \
            cp app/build/outputs/apk/release/app-release.apk artifacts/Game4399-${SUFFIX}-release.apk
          [ -f app/build/outputs/apk/release/app-release-unsigned.apk ] && \
            cp app/build/outputs/apk/release/app-release-unsigned.apk artifacts/Game4399-${SUFFIX}-release-unsigned.apk

          echo "=== artifacts 目录 ==="
          ls -lh artifacts/ 2>/dev/null || echo "artifacts 为空"

      # ---------- 9. 上传 Artifact ----------
      - name: Upload Debug APK
        if: ${{ inputs.build_type == 'debug' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: Game4399-debug
          path: artifacts/*-debug*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Upload Release APK
        if: ${{ inputs.build_type == 'release' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: Game4399-release
          path: artifacts/*-release*.apk
          retention-days: 90
          if-no-files-found: warn

      # ---------- 10. 构建摘要 ----------
      - name: Summary
        if: always()
        run: |
          echo "## 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "- 构建类型: \`${{ inputs.build_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 提交: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -d artifacts ] && [ "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "### 产物" >> $GITHUB_STEP_SUMMARY
            ls -lh artifacts/ | awk 'NR>1 {print "- `" $NF "` (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ 无产物" >> $GITHUB_STEP_SUMMARY
          fi
