name: Android CI/CD

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS_VERSION: '34.0.0'
  ANDROID_SDK_VERSION: '24'

jobs:
  debug-build:
    name: Debug Build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS_VERSION }}
          cmdline-tools: 'latest'
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Prepare Gradle
        run: |
          chmod +x gradlew
          ./gradlew --version
      
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace
      
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error

  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref }}
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS_VERSION }}
          cmdline-tools: 'latest'
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Create debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" 2>/dev/null || true
      
      - name: Inject signing config for release build
        run: |
          echo "" >> gradle.properties
          echo "android.injected.signing.store.file=$PWD/debug.keystore" >> gradle.properties
          echo "android.injected.signing.store.password=android" >> gradle.properties
          echo "android.injected.signing.key.alias=androiddebugkey" >> gradle.properties
          echo "android.injected.signing.key.password=android" >> gradle.properties
      
      - name: Build release APK
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace
      
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [debug-build, release-build]
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "## 贪吃蛇游戏构建结果汇总" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.debug-build.result }}" == "success" ]; then
            echo "✅ 调试版本构建: 成功" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.debug-build.result }}" == "skipped" ]; then
            echo "⏭️ 调试版本构建: 跳过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 调试版本构建: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.release-build.result }}" == "success" ]; then
            echo "✅ 发布版本构建: 成功" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.release-build.result }}" == "skipped" ]; then
            echo "⏭️ 发布版本构建: 跳过" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 发布版本构建: 失败" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**项目:** 贪吃蛇游戏 (SnakeGame)" >> $GITHUB_STEP_SUMMARY
          echo "**触发事件:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**分支:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**构建类型:** ${{ github.event.inputs.build_type }}" >> $GITHUB_STEP_SUMMARY