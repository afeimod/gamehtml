# 项目校验 Workflow
# 在 PR 和 push 时自动运行，检查代码结构与构建配置

name: CI Check

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

  workflow_dispatch:

concurrency:
  group: ci-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Project Structure Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-35
            build-tools;35.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Check project structure
        run: |
          echo "=== 检查关键文件 ==="
          for f in \
            settings.gradle.kts \
            build.gradle.kts \
            gradle/libs.versions.toml \
            app/build.gradle.kts \
            app/src/main/AndroidManifest.xml \
            app/src/main/assets/player.html \
            .github/workflows/build-apk.yml \
            README.md \
            LICENSE
          do
            if [ -f "$f" ]; then
              echo "✓ $f"
            else
              echo "✗ 缺失: $f"
              exit 1
            fi
          done

          echo ""
          echo "=== Kotlin 源文件统计 ==="
          find app/src/main/java -name "*.kt" | wc -l
          echo "个 .kt 文件"

          echo ""
          echo "=== 资源文件统计 ==="
          echo "drawable: $(find app/src/main/res/drawable -type f | wc -l)"
          echo "layout:   $(find app/src/main/res/layout -type f | wc -l)"
          echo "values:   $(find app/src/main/res/values -type f | wc -l)"
          echo "xml:      $(find app/src/main/res/xml -type f | wc -l)"

      - name: Gradle build info
        run: ./gradlew tasks --group=build --no-daemon

      - name: Assemble Debug (smoke test)
        run: ./gradlew assembleDebug --no-daemon --stacktrace
